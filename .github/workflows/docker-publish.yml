name: Build & Publish Docker Image
on:
  push:
    branches: [ "master", "main" ]
  schedule:
    # Run every Monday at 03:00 UTC to pick up fresh DB releases from P3TERX
    - cron: '0 3 * * 1'
  workflow_dispatch:  # Allow manual trigger
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Docker build & push ───────────────────────────────────────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get GeoIP database date
        id: geoip_date
        run: |
          DATE=$(curl -sI https://github.com/P3TERX/GeoLite.mmdb/releases/latest \
            | grep -i location | grep -oP '\d{4}\.\d{2}\.\d{2}')
          echo "date=$DATE" >> $GITHUB_OUTPUT

      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.geoip_date.outputs.date }}
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers between runs for faster builds
          cache-from: type=gha
          cache-to: type=gha,mode=max

